<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrLlama - Minimal Local AI</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #f9f9f9;
            --text: #111111;
            --text-secondary: #666666;
            --border: #eeeeee;
            --primary: #000000;
            --message-user-bg: #f0f0f0;
            --message-assistant-bg: transparent;
            --accent: #0070f3;
            --status-online: #22c55e;
            --status-offline: #ef4444;
        }

        .dark {
            --bg: #000000;
            --sidebar-bg: #111111;
            --text: #ffffff;
            --text-secondary: #888888;
            --border: #222222;
            --primary: #ffffff;
            --message-user-bg: #222222;
            --message-assistant-bg: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .theme-toggle {
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-secondary);
            padding: 4px;
            border-radius: 4px;
        }

        .theme-toggle:hover {
            color: var(--text);
            background: var(--border);
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
        }

        #model-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .model-item {
            width: 100%;
            text-align: left;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: none;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: all 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .model-item:hover {
            background-color: var(--border);
        }

        .model-item.active {
            background-color: var(--bg);
            border-color: var(--border);
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .settings {
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 12px;
            margin-bottom: 8px;
        }

        button.btn {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--primary);
            color: var(--bg);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        button.btn:hover {
            opacity: 0.9;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
        }

        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .current-model {
            font-size: 14px;
            font-weight: 600;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-role {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user .message-content {
            background-color: var(--message-user-bg);
        }

        .assistant .message-content {
            background-color: var(--message-assistant-bg);
            padding-left: 0;
            padding-right: 0;
        }

        /* Input Area */
        .input-container {
            padding: 24px 40px 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .input-box {
            position: relative;
            display: flex;
            align-items: flex-end;
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--text);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            padding: 4px 8px;
            max-height: 200px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.1s;
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Markdown */
        .prose pre {
            background: var(--sidebar-bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 12px 0;
            overflow-x: auto;
            position: relative;
        }

        .prose code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        .prose p { margin-bottom: 12px; }
        .prose ul, .prose ol { margin-left: 20px; margin-bottom: 12px; }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 10px;
            padding: 4px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.1s;
        }

        pre:hover .copy-btn { opacity: 1; }

        /* Helpers */
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 12px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--border);
        }

        .status.online .status-dot { background-color: var(--status-online); }
        .status.offline .status-dot { background-color: var(--status-offline); }

        .hidden { display: none; }

        .welcome {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-secondary);
        }

        .welcome h2 {
            color: var(--text);
            margin-bottom: 8px;
        }

        #stop-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--status-offline);
            margin-right: 8px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>MrLlama</span>
            <button onclick="toggleDarkMode()" class="theme-toggle" id="theme-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </div>

        <span class="section-label">Models</span>
        <div id="model-list">
            <div style="padding: 12px; text-align: center; font-size: 11px; color: var(--text-secondary);">Loading...</div>
        </div>

        <div class="settings">
            <span class="section-label">Settings</span>
            <div class="input-group">
                <input id="api-url-input" type="text" placeholder="Leave blank for same-origin proxy" value="">
                <button onclick="updateApiUrl()" class="btn">Update</button>
            </div>
            
            <div id="status-card" class="status">
                <div class="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </aside>

    <main>
        <header>
            <div class="current-model" id="current-model-display">No model selected</div>
            <button onclick="clearChat()" style="background:none; border:none; color:var(--text-secondary); font-size:12px; cursor:pointer;">Clear</button>
        </header>

        <div id="chat-window">
            <div id="welcome-screen" class="welcome">
                <h2>Local Intelligence</h2>
                <p>Select a model to start chatting.</p>
            </div>
        </div>

        <div class="input-container">
            <form id="chat-form">
                <div class="input-box">
                    <textarea id="user-input" rows="1" placeholder="Type a message..." autocomplete="off"></textarea>
                    <button type="button" id="stop-btn" class="hidden" onclick="stopGeneration()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2" /></svg>
                    </button>
                    <button type="submit" id="send-btn" class="send-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        let OLLAMA_URL = localStorage.getItem('ollama_url') || '';
        let selectedModel = localStorage.getItem('selected_model') || '';
        let chatHistory = [];
        let isGenerating = false;
        let abortController = null;

        const elements = {
            modelList: document.getElementById('model-list'),
            chatWindow: document.getElementById('chat-window'),
            userInput: document.getElementById('user-input'),
            statusCard: document.getElementById('status-card'),
            statusText: document.getElementById('status-text'),
            currentModelDisplay: document.getElementById('current-model-display'),
            welcomeScreen: document.getElementById('welcome-screen'),
            sendBtn: document.getElementById('send-btn'),
            stopBtn: document.getElementById('stop-btn'),
            apiUrlInput: document.getElementById('api-url-input'),
            chatForm: document.getElementById('chat-form')
        };

        // Dark Mode
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateHljsTheme(isDark);
        }

        function updateHljsTheme(isDark) {
            const themeLink = document.getElementById('hljs-theme');
            themeLink.href = isDark 
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            updateHljsTheme(true);
        }

        // Initialize
        elements.apiUrlInput.value = OLLAMA_URL;
        marked.setOptions({ breaks: true });

        async function fetchModels() {
            try {
                const response = await fetch(`${OLLAMA_URL}/api/tags`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderModels(data.models || []);
                setStatus(true);
            } catch (e) {
                setStatus(false);
                elements.modelList.innerHTML = '<div style="padding:12px; font-size:11px; color:var(--status-offline);">Failed to connect. Check CORS.</div>';
            }
        }

        function setStatus(online) {
            elements.statusCard.className = `status ${online ? 'online' : 'offline'}`;
            elements.statusText.innerText = online ? 'Connected' : 'Offline';
        }

        function renderModels(models) {
            if (models.length === 0) {
                elements.modelList.innerHTML = '<div style="padding:12px; font-size:11px;">No models.</div>';
                return;
            }
            elements.modelList.innerHTML = models.map(m => `
                <button class="model-item ${selectedModel === m.name ? 'active' : ''}" onclick="selectModel('${m.name}')">
                    <span>${m.name}</span>
                    <span style="font-size:9px; opacity:0.5;">${m.details?.parameter_size || ''}</span>
                </button>
            `).join('');
            if (!selectedModel && models.length > 0) selectModel(models[0].name);
            else elements.currentModelDisplay.innerText = selectedModel;
        }

        function selectModel(name) {
            selectedModel = name;
            localStorage.setItem('selected_model', name);
            elements.currentModelDisplay.innerText = name;
            fetchModels();
        }

        function updateApiUrl() {
            OLLAMA_URL = elements.apiUrlInput.value.trim();
            localStorage.setItem('ollama_url', OLLAMA_URL);
            fetchModels();
        }

        function clearChat() {
            chatHistory = [];
            elements.chatWindow.innerHTML = '';
            elements.chatWindow.appendChild(elements.welcomeScreen);
            elements.welcomeScreen.classList.remove('hidden');
        }

        function appendMessage(role, content = '') {
            elements.welcomeScreen.classList.add('hidden');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <span class="message-role">${role}</span>
                <div class="message-content prose"></div>
            `;
            elements.chatWindow.appendChild(div);
            elements.chatWindow.scrollTop = elements.chatWindow.scrollHeight;
            return div.querySelector('.message-content');
        }

        function stopGeneration() {
            if (abortController) abortController.abort();
            isGenerating = false;
            updateUIState(false);
        }

        function updateUIState(loading) {
            isGenerating = loading;
            elements.sendBtn.disabled = loading;
            elements.stopBtn.classList.toggle('hidden', !loading);
        }

        async function copyCode(text, btn) {
            await navigator.clipboard.writeText(text);
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = 'Copy', 2000);
        }

        elements.chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = elements.userInput.value.trim();
            if (!text || !selectedModel || isGenerating) return;

            elements.userInput.value = '';
            elements.userInput.style.height = '';
            
            chatHistory.push({ role: 'user', content: text });
            appendMessage('user').innerText = text;

            const assistantMsgEl = appendMessage('assistant');
            assistantMsgEl.innerText = '...';
            
            updateUIState(true);
            abortController = new AbortController();

            try {
                const response = await fetch(`${OLLAMA_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: selectedModel, messages: chatHistory, stream: true }),
                    signal: abortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let partial = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = (partial + chunk).split('\n');
                    partial = lines.pop();

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const json = JSON.parse(line);
                            if (json.message?.content) {
                                fullText += json.message.content;
                                assistantMsgEl.innerHTML = marked.parse(fullText);
                                assistantMsgEl.querySelectorAll('pre code').forEach(block => {
                                    hljs.highlightElement(block);
                                    const pre = block.parentElement;
                                    if (!pre.querySelector('.copy-btn')) {
                                        const btn = document.createElement('button');
                                        btn.className = 'copy-btn';
                                        btn.innerText = 'Copy';
                                        btn.onclick = () => copyCode(block.innerText, btn);
                                        pre.appendChild(btn);
                                    }
                                });
                                elements.chatWindow.scrollTop = elements.chatWindow.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
                chatHistory.push({ role: 'assistant', content: fullText });
            } catch (err) {
                if (err.name === 'AbortError') assistantMsgEl.innerHTML += ' <i>(Stopped)</i>';
                else assistantMsgEl.innerText = 'Error connecting to Ollama.';
            } finally {
                updateUIState(false);
            }
        };

        elements.userInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        };

        elements.userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                elements.chatForm.requestSubmit();
            }
        };

        window.onload = fetchModels;
    </script>
</body>
</html>
